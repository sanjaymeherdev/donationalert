<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
}

h1{
    text-align:center;
    font-size:40px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
    line-height:1.6;
}

.contact-card{
    background:#1e293b;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.contact-info{
    margin-bottom:25px;
}

.contact-info h3{
    margin-bottom:15px;
}

.info-box{
    display:block;
    background:#334155;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    transition:0.3s;
}

.info-box:hover{
    background:#475569;
}

form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

input,
textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    font-size:15px;
}

input::placeholder,
textarea::placeholder{
    color:#94a3b8;
}

textarea{
    resize:vertical;
    min-height:150px;
}

.send-btn{
    border:none;
    padding:14px;
    border-radius:12px;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.send-btn:hover{
    transform:translateY(-2px);
}

@media(max-width:768px){

    h1{
        font-size:30px;
    }

    .contact-card{
        padding:20px;
    }

}
</style>
</head>

<body>

<div class="container">

    <h1>Contact Us</h1>

    <p class="subtitle">
        Need help with donations, payments, or stream alerts?
        Feel free to contact us anytime.
    </p>

    <div class="contact-card">

        <div class="contact-info">

            <h3>📩 Contact Information</h3>

            <a
                href="mailto:pagaljanta76@gmail.com?subject=Donation%20Support"
                class="info-box">
                📧 pagaljanta76@gmail.com
            </a>

            <a
                href="https://instagram.com/freelance.sanjay"
                target="_blank"
                rel="noopener"
                class="info-box">
                📷 @freelance.sanjay
            </a>

        </div>

        <form
            action="mailto:pagaljanta76@gmail.com"
            method="post"
            enctype="text/plain">

            <input
                type="text"
                name="Name"
                placeholder="Your Name"
                required>

            <input
                type="email"
                name="Email"
                placeholder="Your Email"
                required>

            <textarea
                name="Message"
                placeholder="Write your message..."
                required></textarea>

            <button type="submit" class="send-btn">
                Send Message ➜
            </button>

        </form>

    </div>

</div>

</body>
</html>
